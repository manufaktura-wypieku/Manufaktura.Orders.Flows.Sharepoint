name: Deploy solution to TEST and PROD (reusable)
# Reusable workflow
# Pack the solution, deploy to TEST (with approval), then deploy to PROD (with approval)
on:
  workflow_call:
    inputs:
      solution_name:
        description: "The solution name."
        type: string
        default: SolutionName
      solution_shipping_folder:
        description: "folder name for staging the exported solution *do not change*"
        type: string
        default: out/ship/
      solution_outbound_folder:
        description: "staging the unpacked solution folder before check-in *do not change*"
        type: string
        default: out/solutions/
      solution_source_folder:
        description: "folder name to be created and checked in *do not change*"
        type: string
        default: solutions/
      solution_release_folder:
        description: "folder where the released binaries are going to be hosted *do not change*"
        type: string
        default: out/release
      TEST_ENVIRONMENT_URL:
        description: "Test environment url."
        type: string
        required: true
      PRODUCTION_ENVIRONMENT_URL:
        description: "Production environment url."
        type: string
        required: true
      CLIENT_ID:
        description: "The client id"
        type: string
        required: true
      TENANT_ID:
        description: "The tenant id"
        type: string
        required: true
      APPROVERS:
        description: "Comma-separated GitHub usernames allowed to approve promotion."
        type: string
        required: true
      MINIMUM_APPROVALS:
        description: "Number of required approvals before deploy."
        type: number
        default: 1
      TEST_DEPLOYMENT_SETTINGS:
        description: "Path to TEST environment deployment settings file (maps connection references to connections)."
        type: string
        required: false
        default: ""
      PROD_DEPLOYMENT_SETTINGS:
        description: "Path to PROD environment deployment settings file (maps connection references to connections)."
        type: string
        required: false
        default: ""
    secrets:
      envSecret:
        description: "The secret value for authentication using SPN"
        required: true

jobs:
  pack-unmanaged-solution:
    runs-on: windows-latest
    env:
      RUNNER_DEBUG: 1

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Pack solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: ${{ inputs.solution_source_folder}}/${{ inputs.solution_name }}
          solution-file: ${{ inputs.solution_outbound_folder}}/${{ inputs.solution_name }}_unmanaged.zip
          solution-type: Unmanaged

      - name: Upload the ready to ship solution to GH artifact store
        uses: actions/upload-artifact@v4
        with:
          name: managedSolutions
          path: ${{ inputs.solution_outbound_folder}}/${{ inputs.solution_name }}_unmanaged.zip

  approval-for-test:
    needs: [pack-unmanaged-solution]
    runs-on: ubuntu-latest
    steps:
      - name: Await manual approval for test deployment
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ inputs.APPROVERS }}
          minimum-approvals: ${{ inputs.MINIMUM_APPROVALS }}
          issue-title: "Approve deployment to TEST for ${{ inputs.solution_name }}"
          issue-body: "Solution has been packed. Approve to proceed with TEST environment deployment."

  release-to-test:
    needs: [approval-for-test]
    runs-on: windows-latest
    env:
      RUNNER_DEBUG: 1

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Fetch the ready to ship solution from GH artifact store
        uses: actions/download-artifact@v4
        with:
          name: managedSolutions
          path: ${{ inputs.solution_release_folder}}
      - name: Import solution to test env
        if: inputs.TEST_DEPLOYMENT_SETTINGS == ''
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{inputs.TEST_ENVIRONMENT_URL}}
          app-id: ${{inputs.CLIENT_ID}}
          client-secret: ${{ secrets.envSecret }}
          tenant-id: ${{inputs.TENANT_ID}}
          solution-file: ${{ inputs.solution_release_folder}}/${{ inputs.solution_name }}_unmanaged.zip
          force-overwrite: true
          publish-changes: true

      - name: Import solution to test env (with deployment settings)
        if: inputs.TEST_DEPLOYMENT_SETTINGS != ''
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{inputs.TEST_ENVIRONMENT_URL}}
          app-id: ${{inputs.CLIENT_ID}}
          client-secret: ${{ secrets.envSecret }}
          tenant-id: ${{inputs.TENANT_ID}}
          solution-file: ${{ inputs.solution_release_folder}}/${{ inputs.solution_name }}_unmanaged.zip
          force-overwrite: true
          publish-changes: true
          deployment-settings-file: ${{ inputs.TEST_DEPLOYMENT_SETTINGS }}

  approval-for-production:
    needs: [release-to-test]
    runs-on: ubuntu-latest
    steps:
      - name: Await manual approval for production deployment
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ inputs.APPROVERS }}
          minimum-approvals: ${{ inputs.MINIMUM_APPROVALS }}
          issue-title: "Approve deployment to PRODUCTION for ${{ inputs.solution_name }}"
          issue-body: "Test deployment completed. Approve to proceed with PRODUCTION environment deployment."

  release-to-production:
    needs: [approval-for-production]
    runs-on: windows-latest
    env:
      RUNNER_DEBUG: 1

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Fetch the ready to ship solution from GH artifact store
        uses: actions/download-artifact@v4
        with:
          name: managedSolutions
          path: ${{ inputs.solution_release_folder}}
      - name: Import solution to prod env
        if: inputs.PROD_DEPLOYMENT_SETTINGS == ''
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{inputs.PRODUCTION_ENVIRONMENT_URL}}
          app-id: ${{inputs.CLIENT_ID}}
          client-secret: ${{ secrets.envSecret }}
          tenant-id: ${{inputs.TENANT_ID}}
          solution-file: ${{ inputs.solution_release_folder}}/${{ inputs.solution_name }}_unmanaged.zip
          force-overwrite: true
          publish-changes: true

      - name: Import solution to prod env (with deployment settings)
        if: inputs.PROD_DEPLOYMENT_SETTINGS != ''
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{inputs.PRODUCTION_ENVIRONMENT_URL}}
          app-id: ${{inputs.CLIENT_ID}}
          client-secret: ${{ secrets.envSecret }}
          tenant-id: ${{inputs.TENANT_ID}}
          solution-file: ${{ inputs.solution_release_folder}}/${{ inputs.solution_name }}_unmanaged.zip
          force-overwrite: true
          publish-changes: true
          deployment-settings-file: ${{ inputs.PROD_DEPLOYMENT_SETTINGS }}
